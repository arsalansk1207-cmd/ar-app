<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Scanner</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.35s ease,transform 0.35s ease}
  .screen.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}

  /* SPLASH */
  #splash{background:#000;z-index:100}
  .splash-logo{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,#00f0a0,#0080ff);display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:logoIn 0.7s cubic-bezier(.34,1.56,.64,1) both}
  .splash-logo svg{width:46px;height:46px;fill:white}
  .splash-title{font-size:30px;font-weight:700;color:#fff;letter-spacing:-0.5px;animation:fadeUp 0.5s 0.2s both}
  .splash-sub{font-size:14px;color:rgba(255,255,255,0.4);margin-top:6px;animation:fadeUp 0.5s 0.35s both}
  .splash-bar{width:140px;height:3px;background:rgba(255,255,255,0.08);border-radius:99px;margin-top:48px;overflow:hidden;animation:fadeUp 0.5s 0.45s both}
  .splash-progress{height:100%;width:0%;background:linear-gradient(90deg,#00f0a0,#0080ff);border-radius:99px;animation:loadBar 2s 0.5s ease forwards}

  /* SCANNER */
  #scanner{background:#000;z-index:10}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #canvas{display:none}
  .scanner-ui{position:absolute;inset:0;display:flex;flex-direction:column}
  .scanner-top{padding:54px 22px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.72) 0%,transparent 100%)}
  .scanner-title{font-size:17px;font-weight:600;color:#fff}
  .scanner-bottom{margin-top:auto;padding:20px;background:linear-gradient(to top,rgba(0,0,0,0.72) 0%,transparent 100%);text-align:center}
  .scanner-hint{font-size:13px;color:rgba(255,255,255,0.45)}
  .admin-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 14px;border-radius:99px;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-size:12px;text-decoration:none}

  .viewfinder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(72vw,290px);height:min(72vw,290px)}
  .vf-corner{position:absolute;width:26px;height:26px}
  .vf-corner::before,.vf-corner::after{content:'';position:absolute;background:#00f0a0;border-radius:2px}
  .vf-corner::before{width:3px;height:100%}
  .vf-corner::after{width:100%;height:3px}
  .vf-corner.tl{top:0;left:0}
  .vf-corner.tr{top:0;right:0;transform:scaleX(-1)}
  .vf-corner.bl{bottom:0;left:0;transform:scaleY(-1)}
  .vf-corner.br{bottom:0;right:0;transform:scale(-1)}
  .scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,#00f0a0,transparent);border-radius:99px;animation:scanLine 2s ease-in-out infinite;box-shadow:0 0 12px #00f0a0}
  .detected-flash{position:absolute;inset:-4px;border-radius:8px;border:3px solid #00f0a0;opacity:0;transition:opacity 0.12s;box-shadow:0 0 24px rgba(0,240,160,0.6)}
  .detected-flash.active{opacity:1}
  .scan-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,calc(-50% - min(38vw,170px) - 18px));background:rgba(0,240,160,0.15);border:1px solid rgba(0,240,160,0.5);border-radius:99px;padding:5px 16px;font-size:13px;color:#00f0a0;font-weight:500;opacity:0;transition:opacity 0.2s;white-space:nowrap;backdrop-filter:blur(8px)}
  .scan-badge.active{opacity:1}

  /* PLAYER */
  #player{background:#000;z-index:20;flex-direction:column}
  #player-video{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
  .player-overlay{position:absolute;inset:0;display:flex;flex-direction:column;pointer-events:none}
  .player-top{padding:52px 18px 18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);pointer-events:all;transition:opacity 0.3s}
  .player-bottom{margin-top:auto;padding:18px 18px 38px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);pointer-events:all;transition:opacity 0.3s}
  .player-overlay.hide .player-top,.player-overlay.hide .player-bottom{opacity:0;pointer-events:none}
  .ctrl-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.12s;color:#fff}
  .ctrl-btn:active{transform:scale(0.88);background:rgba(255,255,255,0.22)}
  .ctrl-btn svg{width:19px;height:19px;fill:#fff}
  .video-title{font-size:15px;font-weight:600;color:#fff;flex:1;margin:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .progress-wrap{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .progress-time{font-size:12px;color:rgba(255,255,255,0.55);min-width:34px;font-variant-numeric:tabular-nums}
  .progress-bar{flex:1;height:3px;background:rgba(255,255,255,0.18);border-radius:99px;cursor:pointer;position:relative}
  .progress-fill{height:100%;background:#00f0a0;border-radius:99px;pointer-events:none;transition:width 0.1s linear}
  .progress-thumb{position:absolute;top:50%;right:-6px;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#00f0a0}
  .player-controls{display:flex;align-items:center;justify-content:space-between}
  .center-controls{display:flex;align-items:center;gap:28px}
  .big-play{width:62px;height:62px;border-radius:50%;border:none;background:rgba(255,255,255,0.14);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.12s}
  .big-play:active{transform:scale(0.88)}
  .big-play svg{width:27px;height:27px;fill:#fff}
  .skip-btn{background:none;border:none;color:rgba(255,255,255,0.65);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
  .skip-btn svg{width:21px;height:21px;fill:rgba(255,255,255,0.65)}
  .rescan-btn{padding:9px 18px;border-radius:99px;border:1.5px solid rgba(0,240,160,0.6);background:transparent;color:#00f0a0;font-size:13px;font-weight:500;cursor:pointer;transition:background 0.15s}
  .rescan-btn:active{background:rgba(0,240,160,0.1)}

  @keyframes logoIn{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes loadBar{from{width:0}to{width:100%}}
  @keyframes scanLine{0%,100%{top:4px;opacity:0.5}50%{top:calc(100% - 6px);opacity:1}}

  /* DEBUG PANEL */
  .debug-panel{position:fixed;bottom:24px;left:24px;background:rgba(0,0,0,0.85);border:1px solid rgba(0,240,160,0.3);border-radius:8px;padding:12px;font-size:11px;color:#00f0a0;font-family:monospace;max-width:280px;z-index:50;max-height:200px;overflow-y:auto;display:block}
  .debug-panel.hidden{display:none}
  .debug-label{font-weight:bold;margin-top:6px;margin-bottom:2px}
  .debug-value{color:rgba(255,255,255,0.6);word-break:break-all}
  .debug-toggle{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:#00f0a0;color:#000;border:none;cursor:pointer;font-weight:bold;z-index:51;font-size:20px;display:flex;align-items:center;justify-content:center}

</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen">
  <div class="splash-logo">
    <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm5 8h-3v3h-3v3h3v-3h3v3h3v-3h-3v-3zm0-8v3h3V5h-3zm-3 3h-2v3h2V8zM5 5v3h3V5H5zm0 11v3h3v-3H5z"/></svg>
  </div>
  <div class="splash-title">AR Scanner</div>
  <div class="splash-sub">Point. Scan. Watch.</div>
  <div class="splash-bar"><div class="splash-progress"></div></div>
</div>

<!-- SCANNER -->
<div id="scanner" class="screen hidden">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="scanner-ui">
    <div class="scanner-top">
      <div class="scanner-title">AR Scanner</div>
    </div>
    <div class="viewfinder">
      <div class="vf-corner tl"></div>
      <div class="vf-corner tr"></div>
      <div class="vf-corner bl"></div>
      <div class="vf-corner br"></div>
      <div class="scan-line"></div>
      <div class="detected-flash" id="detectedFlash"></div>
    </div>
    <div class="scan-badge" id="scanBadge">QR Detected!</div>
    <div class="scanner-bottom">
      <div class="scanner-hint">Aim at a QR code to play its video</div>
      <a href="/admin" class="admin-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15a3 3 0 100-6 3 3 0 000 6zm7.94-2a7.94 7.94 0 00.07-1c0-.35-.03-.7-.07-1l2.15-1.68a.5.5 0 00.12-.64l-2.04-3.53a.5.5 0 00-.61-.22l-2.54 1.02a7.5 7.5 0 00-1.73-1l-.38-2.7A.49.49 0 0014.5 2h-4.08a.49.49 0 00-.49.42l-.38 2.7a7.5 7.5 0 00-1.73 1L5.28 5.1a.5.5 0 00-.61.22L2.63 8.85a.49.49 0 00.12.64L4.9 11.17c-.04.3-.07.65-.07 1s.03.7.07 1L2.75 14.85a.5.5 0 00-.12.64l2.04 3.53a.5.5 0 00.61.22l2.54-1.02c.54.38 1.12.69 1.73 1l.38 2.7c.06.24.28.42.54.42h4.08c.26 0 .48-.18.53-.42l.38-2.7a7.5 7.5 0 001.73-1l2.54 1.02c.23.09.5 0 .61-.22l2.04-3.53a.49.49 0 00-.12-.64L19.94 13z"/></svg>
        Admin Panel
      </a>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player" class="screen hidden">
  <video id="player-video" playsinline></video>
  <div class="player-overlay" id="playerOverlay">
    <div class="player-top">
      <button class="ctrl-btn" onclick="closePlayer()">
        <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
      </button>
      <div class="video-title" id="videoTitle">Now Playing</div>
      <button class="ctrl-btn" onclick="toggleSound()">
        <svg viewBox="0 0 24 24" id="soundIcon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;pointer-events:all" onclick="togglePlayUI()"></div>
    <div class="player-bottom">
      <div class="progress-wrap">
        <span class="progress-time" id="curTime">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seekVideo(event)">
          <div class="progress-fill" id="progressFill" style="width:0%">
            <div class="progress-thumb"></div>
          </div>
        </div>
        <span class="progress-time" id="durTime">0:00</span>
      </div>
      <div class="player-controls">
        <button class="skip-btn" onclick="seekBy(-10)">
          <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          <span>10s</span>
        </button>
        <button class="big-play" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="skip-btn" onclick="seekBy(10)">
          <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
          <span>10s</span>
        </button>
        <button class="rescan-btn" onclick="closePlayer()">Scan Again</button>
      </div>
    </div>
  </div>
</div>

<div class="debug-panel hidden" id="debugPanel">
  <div class="debug-label">Detection Stats</div>
  <div class="debug-label">State:</div>
  <div class="debug-value" id="dbgState">SCANNING</div>
  <div class="debug-label">Targets:</div>
  <div class="debug-value" id="dbgTargets">0</div>
  <div class="debug-label">Last Match:</div>
  <div class="debug-value" id="dbgMatch">None</div>
  <div class="debug-label">Match Count:</div>
  <div class="debug-value" id="dbgMatchCount">0</div>
  <div class="debug-label">CV.js:</div>
  <div class="debug-value" id="dbgCV">Loading...</div>
</div>
<button class="debug-toggle" onclick="toggleDebug()">D</button>

<script async src="https://docs.opencv.org/4.5.2/opencv.js"></script>
<script>
// States
const STATES = { SCANNING: 'SCANNING', LOCKED: 'LOCKED', ENDED: 'ENDED' };
let state = STATES.SCANNING;

let mappings = [];
let muted = false;
let overlayTimer = null;
let targetImages = []; // Pre-computed target image features
let scanInterval = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const playerVideo = document.getElementById('player-video');

async function loadMappings() {
  try {
    const res = await fetch('/api/scanner-mappings');
    mappings = await res.json();
    // Preload and pre-compute target image features
    await preloadTargetImages();
    console.log(`Loaded ${targetImages.length} target images for matching`);
    document.getElementById('dbgTargets').textContent = targetImages.length + ' loaded';
  } catch(e) { 
    console.error('Failed to load mappings:', e);
    mappings = []; 
  }
}

// Wait for OpenCV to load
function onOpenCvReady() {
  console.log('OpenCV.js is ready');
  document.getElementById('dbgCV').textContent = 'Ready';
}

async function preloadTargetImages() {
  targetImages = [];
  for (const m of mappings) {
    if (m.targetImageUrl) {
      try {
        await new Promise(resolve => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = async () => {
            const c = document.createElement('canvas');
            c.width = img.width;
            c.height = img.height;
            const ctx = c.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            // Pre-compute features once
            const features = await computeFeatures(c);
            if (features) {
              targetImages.push({
                id: m.id,
                mapping: m,
                features: features
              });
            }
            resolve();
          };
          img.onerror = () => {
            console.warn('Failed to load target image:', m.targetImageUrl);
            resolve();
          };
          img.src = m.targetImageUrl;
        });
      } catch(e) {
        console.warn('Error preloading target image:', e);
      }
    }
  }
}

async function computeFeatures(canvas) {
  try {
    if (!cv) return null;
    
    const src = cv.imread(canvas);
    const gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    
    // ORB detector with optimized parameters
    const orb = new cv.ORB(1000, 1.2, 8); // More features for better matching
    const kp = [];
    const desc = new cv.Mat();
    orb.detectAndCompute(gray, new cv.Mat(), kp, desc, false);
    
    src.delete();
    gray.delete();
    
    return { keypoints: kp, descriptors: desc };
  } catch(e) {
    console.error('Error computing features:', e);
    return null;
  }
}

window.addEventListener('load', async () => {
  await loadMappings();
  setTimeout(() => { show('scanner'); startCamera(); }, 2400);
});

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id !== id));
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => { 
      state = STATES.SCANNING;
      startScanning(); 
    };
  } catch(e) {
    alert('Camera access is required. Please allow camera access and reload.');
  }
}

function startScanning() {
  if (scanInterval) clearInterval(scanInterval);
  // Scan every 400ms for better performance
  scanInterval = setInterval(detectFrame, 400);
}

function stopScanning() {
  if (scanInterval) {
    clearInterval(scanInterval);
    scanInterval = null;
  }
}

function detectFrame() {
  if (state !== STATES.SCANNING || !cv || targetImages.length === 0 || video.readyState !== video.HAVE_ENOUGH_DATA) {
    return;
  }
  
  try {
    // Capture current frame
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    // Compute frame features once
    const src = cv.imread(canvas);
    const gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    
    const orb = new cv.ORB(1000, 1.2, 8);
    const kp = [];
    const desc = new cv.Mat();
    orb.detectAndCompute(gray, new cv.Mat(), kp, desc, false);
    
    // Try matching against each target
    let bestMatch = null;
    let bestMatchCount = 0;
    
    for (const target of targetImages) {
      if (!target.features || target.features.descriptors.rows === 0 || desc.rows === 0) continue;
      
      try {
        // Use KNN matcher for better accuracy (8+ good matches threshold)
        const bf = new cv.BFMatcher(cv.NORM_HAMMING, false);
        const knnMatches = bf.knnMatch(desc, target.features.descriptors, 2);
        
        // Apply Lowe's ratio test
        const goodMatches = [];
        for (let i = 0; i < knnMatches.length; i++) {
          const dmatch = knnMatches[i];
          if (dmatch.length === 2) {
            const [m, n] = dmatch;
            // Lowe's ratio test - ratio should be < 0.7
            if (m.distance < 0.7 * n.distance) {
              goodMatches.push(m);
            }
          }
        }
        
        // Check if this is best match (threshold: 8+ good matches)
        if (goodMatches.length > bestMatchCount) {
          bestMatchCount = goodMatches.length;
          bestMatch = target;
        }
      } catch(e) {
        console.warn('Matching error:', e);
      }
    }
    
    // Update debug panel
    document.getElementById('dbgMatchCount').textContent = bestMatchCount;
    if (bestMatch) {
      document.getElementById('dbgMatch').textContent = bestMatch.mapping.title;
    }
    
    // Trigger if we have enough matches
    if (bestMatchCount >= 8 && bestMatch) {
      handleDetected(bestMatch.mapping);
    }
    
    // Cleanup
    src.delete();
    gray.delete();
    desc.delete();
    
  } catch(e) {
    console.error('Frame detection error:', e);
  }
}

function handleDetected(mapping) {
  if (state !== STATES.SCANNING) return;
  
  state = STATES.LOCKED;
  stopScanning();
  
  // Visual feedback
  document.getElementById('detectedFlash').classList.add('active');
  document.getElementById('scanBadge').classList.add('active');
  if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
  
  setTimeout(() => {
    document.getElementById('detectedFlash').classList.remove('active');
    document.getElementById('scanBadge').classList.remove('active');
    playVideo(mapping);
  }, 320);
}

function playVideo(mapping) {
  document.getElementById('videoTitle').textContent = mapping.title || 'Now Playing';
  playerVideo.src = mapping.videoUrl;
  playerVideo.muted = muted;
  show('player');
  
  // Pause video track to improve performance
  video.srcObject.getTracks().forEach(track => track.enabled = false);
  
  playerVideo.play();
  updatePlayIcon();
  startOverlayTimer();
  
  // When video ends, go back to scanning
  playerVideo.onended = () => {
    closePlayer();
  };
  
  // Refresh mappings in background
  loadMappings();
}

function closePlayer() {
  playerVideo.pause();
  playerVideo.src = '';
  
  // Resume video track
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.enabled = true);
  }
  
  show('scanner');
  state = STATES.SCANNING;
  startScanning();
}

function togglePlay() {
  playerVideo.paused ? playerVideo.play() : playerVideo.pause();
  updatePlayIcon(); 
  startOverlayTimer();
}

function togglePlayUI() {
  const ov = document.getElementById('playerOverlay');
  if (ov.classList.contains('hide')) { 
    ov.classList.remove('hide'); 
    startOverlayTimer(); 
  } else {
    ov.classList.add('hide');
  }
}

function updatePlayIcon() {
  document.getElementById('playIcon').setAttribute('d',
    playerVideo.paused ? 'M8 5v14l11-7z' : 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
}

function seekBy(s) { 
  playerVideo.currentTime = Math.max(0, Math.min(playerVideo.duration||0, playerVideo.currentTime+s)); 
  startOverlayTimer(); 
}

function seekVideo(e) {
  const b = document.getElementById('progressBar').getBoundingClientRect();
  playerVideo.currentTime = ((e.clientX - b.left) / b.width) * (playerVideo.duration||0);
  startOverlayTimer();
}

function toggleSound() {
  muted = !muted; 
  playerVideo.muted = muted;
  document.getElementById('soundIcon').setAttribute('d', muted
    ? 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z'

}

function startOverlayTimer() {
  const ov = document.getElementById('playerOverlay');
  ov.classList.remove('hide');
  clearTimeout(overlayTimer);
  overlayTimer = setTimeout(() => { 
    if (!playerVideo.paused) ov.classList.add('hide'); 
  }, 3000);
}

playerVideo.addEventListener('timeupdate', () => {
  const c = playerVideo.currentTime, d = playerVideo.duration||0;
  document.getElementById('progressFill').style.width = (d ? (c/d)*100 : 0) + '%';
  document.getElementById('curTime').textContent = fmt(c);
  document.getElementById('durTime').textContent = fmt(d);
});

playerVideo.addEventListener('ended', () => { 
  updatePlayIcon(); 
  document.getElementById('playerOverlay').classList.remove('hide'); 
});

playerVideo.addEventListener('play', updatePlayIcon);
playerVideo.addEventListener('pause', updatePlayIcon);

function fmt(s) { 
  const m = Math.floor(s/60), sec = Math.floor(s%60); 
  return m + ':' + (sec<10?'0':'') + sec; 
}

function toggleDebug() {
  const panel = document.getElementById('debugPanel');
  panel.classList.toggle('hidden');
  const state_text = panel.classList.contains('hidden') ? 'OFF' : 'ON';
  console.log('Debug panel:', state_text);
}

// Update state in debug panel
setInterval(() => {
  document.getElementById('dbgState').textContent = state;
}, 100);

</script>
